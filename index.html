<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Pad</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
      font-size: 24px;
      color: #333;
    }

    .top-actions {
      width: min(1200px, calc(100vw - 2rem));
      margin: 14px auto 0;
      padding-bottom: 10px;
      display: flex;
      justify-content: flex-end;
    }

    #new-doc-btn {
      border: 1px solid #333;
      background: #fff;
      color: #333;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #new-doc-btn:hover {
      background: #333;
      color: #fff;
    }

    #editor-container {
      height: clamp(420px, 70vh, 820px);
      width: min(1200px, calc(100vw - 2rem));
      margin: 20px auto;
      border: 1px solid #ddd;
    }

    @media (max-width: 768px) {
      h1 {
        padding: 14px;
        font-size: 20px;
      }

      .top-actions {
        width: calc(100vw - 1rem);
        margin-top: 10px;
        padding-bottom: 8px;
      }

      #editor-container {
        width: calc(100vw - 1rem);
        margin: 12px auto;
      }
    }
  </style>
</head>
<body>
  <h1 id="page-title">Simple Pad</h1>
  <div class="top-actions">
    <button id="new-doc-btn" type="button">Create New Doc</button>
  </div>
  <div id="editor-container"></div>

  <!-- Firebase compatibility scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

  <!-- Quill.js scripts -->
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <script>
    // Firebase configuration (replace these with your Firebase project credentials)
    const firebaseConfig = {
        apiKey: "AIzaSyCihM6OKPhirXWmOEwWmDB87VZmRStdv1M",
        authDomain: "firepad-54817.firebaseapp.com",
        databaseURL: "https://firepad-54817-default-rtdb.firebaseio.com",
        projectId: "firepad-54817",
        storageBucket: "firepad-54817.firebasestorage.app",
        messagingSenderId: "899356239102",
        appId: "1:899356239102:web:d1d8eba1d64f4dc965f1af"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Create a unique document ID for a new shared doc
    const createDocumentId = () => {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }

      return `doc-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    };

    // Get the unique document ID from the URL
    const getDocumentIdFromURL = () => {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('doc') || 'default-doc'; // Fallback to 'default-doc' if no `doc` parameter
    };

    const documentId = getDocumentIdFromURL();

    document.getElementById('new-doc-btn').addEventListener('click', () => {
      const newDocumentId = createDocumentId();
      const nextURL = new URL(window.location.href);
      nextURL.searchParams.set('doc', newDocumentId);
      window.location.href = nextURL.toString();
    });

    // Update the page title dynamically
    document.getElementById('page-title').textContent = `Simple Pad:# ${documentId}`;

    // Initialize Quill.js
    const quill = new Quill('#editor-container', {
      theme: 'snow',
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline'], // Text styles
          [{ 'header': [1, 2, 3, false] }], // Headers
          [{ 'list': 'ordered' }, { 'list': 'bullet' }], // Lists
          ['link', 'image'], // Links and images
          ['clean'] // Clear formatting
        ]
      }
    });

    // Reference the specific document in Firebase
    const docRef = database.ref(`documents/${documentId}`);

    // Check if the document exists
    docRef.once('value').then((snapshot) => {
      if (!snapshot.exists()) {
        // Create a new document if it doesn't exist
        docRef.set({ content: '' });
      }

      // Sync changes from Firebase to Quill.js
      docRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.content !== quill.root.innerHTML) {
          quill.root.innerHTML = data.content;
        }
      });

      // Sync changes from Quill.js to Firebase
      quill.on('text-change', () => {
        const content = quill.root.innerHTML;
        docRef.set({ content });
      });
    });
  </script>
</body>
</html>
